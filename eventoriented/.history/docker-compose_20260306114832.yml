version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
  publisher:
    image: python:3.8-slim
    volumes:
    - ./publisher:/app
    working_dir: /app
    command: python publish.py
    environment:
    - RABBITMQ_HOST=rabbitmq
    - RABBITMQ_USERNAME=user
    - RABBITMQ_PASSWORD=password
    depends_on:
    - rabbitmq
